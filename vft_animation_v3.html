<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFT Animation</title>
<style>
  html { background: transparent; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  .scene {
    width: 620px;
    height: 520px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Tunnel light from center */
  .tunnel-light {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 0; height: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(74,127,193,0.35) 0%, transparent 70%);
    animation: tunnelExpand 2.2s ease-out 0.1s forwards;
    opacity: 0;
  }
  @keyframes tunnelExpand {
    0%   { width: 0px; height: 0px; opacity: 0; }
    20%  { opacity: 1; }
    100% { width: 600px; height: 420px; opacity: 0; }
  }

  /* Road perspective lines */
  .road-lines {
    position: absolute;
    bottom: 80px; left: 10px;
    width: 600px; height: 200px;
    opacity: 0;
    animation: roadFade 0.6s ease-out 1.8s forwards;
  }
  @keyframes roadFade { to { opacity: 1; } }

  /* Ring pulse on arrival */
  .ring-pulse {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px; height: 100px;
    border: 2.5px solid rgba(74,127,193,0.9);
    border-radius: 50%;
    opacity: 0;
    animation: ringOut 1s ease-out 2.0s forwards;
  }
  .ring-pulse2 {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px; height: 100px;
    border: 2px solid rgba(74,127,193,0.6);
    border-radius: 50%;
    opacity: 0;
    animation: ringOut 1s ease-out 2.18s forwards;
  }
  .ring-pulse3 {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 160px; height: 90px;
    border: 1.5px solid rgba(74,127,193,0.35);
    border-radius: 50%;
    opacity: 0;
    animation: ringOut 0.8s ease-out 2.4s forwards;
  }
  @keyframes ringOut {
    0%   { width: 180px; height: 100px; opacity: 0.9; }
    100% { width: 460px; height: 280px; opacity: 0; }
  }

  /* Car wrapper - zoom from center (z-axis) */
  .car-wrapper {
    position: relative;
    z-index: 10;
    margin-bottom: 8px;
    animation: carZoomIn 2.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    transform: scale(0.06);
    opacity: 0;
    transform-origin: center center;
  }
  @keyframes carZoomIn {
    0%   { transform: scale(0.06); opacity: 0;   filter: blur(6px); }
    20%  { opacity: 0.8;           filter: blur(3px); }
    65%  { transform: scale(1.57); filter: blur(0px); opacity: 1; }
    80%  { transform: scale(1.46); }
    90%  { transform: scale(1.52); }
    100% { transform: scale(1.48); opacity: 1;   filter: blur(0px); }
  }

  /* Car image */
  .car-img {
    width: 340px;
    display: block;
    animation: floatCar 2.5s ease-in-out 2.3s infinite alternate;
    filter: drop-shadow(0 10px 30px rgba(74,127,193,0.6));
  }
  @keyframes floatCar {
    0%   { transform: translateY(0px);  filter: drop-shadow(0 12px 35px rgba(74,127,193,0.7)); }
    100% { transform: translateY(-14px); filter: drop-shadow(0 28px 50px rgba(74,127,193,1)); }
  }

  /* Ground glow */
  .car-glow {
    position: absolute;
    bottom: -16px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 18px;
    background: radial-gradient(ellipse, rgba(74,127,193,0.6) 0%, transparent 70%);
    opacity: 0;
    animation: glowAppear 0.5s ease-out 2.1s forwards,
               glowPulse 2.5s ease-in-out 2.6s infinite alternate;
  }
  @keyframes glowAppear { to { opacity: 1; } }
  @keyframes glowPulse {
    0%   { width: 270px; opacity: 0.6; }
    100% { width: 330px; opacity: 1.0; }
  }

  /* Headlight beam */
  .headlight-beam {
    position: absolute;
    bottom: 50px; left: 50%;
    transform: translateX(-50%);
    width: 360px; height: 90px;
    background: radial-gradient(ellipse at 50% 0%, rgba(180,220,255,0.10) 0%, transparent 70%);
    opacity: 0;
    animation: beamOn 0.5s ease-out 2.2s forwards;
  }
  @keyframes beamOn { to { opacity: 1; } }
  /* ════════════════════════════════════════
     HIỆU ỨNG GIÓ - WIND STREAKS
     ════════════════════════════════════════ */
 
  /* Container gió */
  .wind-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    opacity: 0;
    animation: windAppear 0.3s ease-out 0.4s forwards;
  }
  @keyframes windAppear { to { opacity: 1; } }
 
  /* Thanh gió cơ bản */
  .wind-streak {
    position: absolute;
    height: 1.5px;
    border-radius: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(74,127,193,0.0) 10%,
      rgba(74,127,193,var(--op)) 50%,
      rgba(180,220,255,var(--op)) 80%,
      transparent 100%);
    animation: windMove var(--dur) linear var(--dl) var(--rep);
    opacity: 0;
    left: 110%;
  }
  @keyframes windMove {
    0%   { left: 110%; opacity: 0; }
    5%   { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { left: -20%;  opacity: 0; }
  }
 
  /* Vệt sáng hội tụ từ trung tâm (tunnel) */
  .tunnel-streak {
    position: absolute;
    height: 1px;
    border-radius: 4px;
    transform-origin: right center;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(74,127,193,0.7) 70%,
      rgba(200,230,255,0.9) 100%);
    animation: tunnelStreak var(--dur) ease-out var(--dl) forwards;
    opacity: 0;
  }
  @keyframes tunnelStreak {
    0%   { width: 0px;   opacity: 0;   transform: scaleX(0); }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { width: var(--w); opacity: 0; transform: scaleX(1); }
  }
 
  /* ════════════════════════════════════════
     HIỆU ỨNG VẬT LÝ - SHOCKWAVE KHI XE ĐẾN
     ════════════════════════════════════════ */
 
  /* Sóng xung kích */
  .shockwave {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    border-radius: 50%;
    border: 3px solid rgba(74,127,193,0.0);
    opacity: 0;
    animation: shockwaveExpand 0.6s ease-out var(--delay) forwards;
  }
  @keyframes shockwaveExpand {
    0%   { width: 60px;  height: 40px;  border-color: rgba(74,127,193,0.9); opacity: 1; }
    60%  { border-color: rgba(74,127,193,0.4); }
    100% { width: 560px; height: 340px; border-color: rgba(74,127,193,0.0); opacity: 0; }
  }
 
  /* Dust / bụi khi xe dừng */
  .dust {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse,
      rgba(74,127,193,0.5) 0%,
      transparent 70%);
    opacity: 0;
    animation: dustBurst var(--dur) ease-out var(--dl) forwards;
  }
  @keyframes dustBurst {
    0%   { transform: scale(0) translateX(0);   opacity: 0.8; }
    40%  { opacity: 0.5; }
    100% { transform: scale(1) translateX(var(--tx)); opacity: 0; }
  }
 
  /* Compression wave - sóng nén không khí */
  .compress-ring {
    position: absolute;
    top: 46%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1.5px solid rgba(140,200,255,0.0);
    opacity: 0;
    animation: compressRing 0.4s ease-out 2.05s forwards;
  }
  @keyframes compressRing {
    0%   { width: 320px; height: 200px; border-color: rgba(140,200,255,0.8); opacity: 1; transform: translate(-50%,-50%) scaleY(0.3); }
    50%  { transform: translate(-50%,-50%) scaleY(1); border-color: rgba(140,200,255,0.4); }
    100% { width: 380px; height: 240px; border-color: rgba(140,200,255,0.0); opacity: 0; }
  }
 
  /* Air distortion glow quanh xe */
  .air-distortion {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    width: 380px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(ellipse,
      rgba(74,127,193,0.0) 40%,
      rgba(74,127,193,0.12) 70%,
      transparent 100%);
    opacity: 0;
    animation: airDistort 0.5s ease-out 1.95s forwards, airBreath 3s ease-in-out 2.5s infinite alternate;
  }
  @keyframes airDistort { to { opacity: 1; } }
  @keyframes airBreath {
    0%   { width: 360px; height: 250px; opacity: 0.6; }
    100% { width: 400px; height: 280px; opacity: 0.9; }
  }
  /* Text section */
  .text-section {
    position: absolute;
    bottom: 70px; left: 0; right: 0;
    text-align: center;
    opacity: 0;
    animation: textReveal 0.9s cubic-bezier(0.22,1,0.36,1) 2.1s forwards;
  }
  @keyframes textReveal {
    0%   { opacity: 0; transform: translateY(18px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0)    scale(1.00); }
  }

  .brand-name {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 14px;
    color: #4a7fc1;
    text-shadow: 0 0 30px rgba(74,127,193,0.9), 0 0 60px rgba(74,127,193,0.4);
    animation: brandGlow 3s ease-in-out 3s infinite alternate;
  }
  @keyframes brandGlow {
    0%   { text-shadow: 0 0 20px rgba(74,127,193,0.7), 0 0 40px rgba(74,127,193,0.3); }
    100% { text-shadow: 0 0 45px rgba(74,127,193,1.0), 0 0 90px rgba(74,127,193,0.6); }
  }

  .tagline {
    font-size: 11.5px;
    letter-spacing: 3.5px;
    color: rgba(74,127,193,0.75);
    text-transform: uppercase;
    margin-top: 3px;
    font-weight: 500;
  }

  .copyright {
    font-size: 9.5px;
    letter-spacing: 1.5px;
    color: rgba(74,127,193,0.4);
    margin-top: 6px;
    font-weight: 300;
  }

  /* Scan line */
  .scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(74,127,193,0.5), transparent);
    opacity: 0;
    animation: scan 3.5s linear 2.3s infinite;
  }
  @keyframes scan {
    0%   { top: 0%;   opacity: 0; }
    5%   { opacity: 0.7; }
    95%  { opacity: 0.5; }
    100% { top: 100%; opacity: 0; }
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: rgba(74,127,193,0.45);
    border-style: solid;
    opacity: 0;
    animation: cornerFade 0.5s ease-out 2.1s forwards;
  }
  .corner-tl { top: 10px; left: 10px;  border-width: 2px 0 0 2px; }
  .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 10px; left: 10px;  border-width: 0 0 2px 2px; }
  .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
  @keyframes cornerFade { to { opacity: 1; } }

  /* Particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #4a7fc1;
    opacity: 0;
    animation: pFloat var(--d) ease-in-out var(--dl) infinite;
  }
  @keyframes pFloat {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    35%  { opacity: 0.6; transform: translateY(-25px) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.4); }
  }
</style>
</head>

<div class="scene">

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="scanline"></div>
  <div class="tunnel-light"></div>
  <!-- Shockwaves khi xe đến -->
  <div class="shockwave" style="--delay:2.02s;"></div>
  <div class="shockwave" style="--delay:2.12s; border-width:2px; border-color:rgba(74,127,193,0.6);"></div>
  <div class="shockwave" style="--delay:2.24s; border-width:1.5px;"></div>
 
  <!-- Compression ring -->
  <div class="compress-ring"></div>
 
  <!-- Air distortion -->
  <!-- <div class="air-distortion"></div> -->
  <div class="ring-pulse"></div>
  <div class="ring-pulse2"></div>
